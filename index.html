<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Coin Manager PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #3498db; --green: #2ecc71; --red: #e74c3c; --bg: #f5f6fa; --card-bg: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header-tools { position: sticky; top: 0; z-index: 999; background: white; padding: 10px; display: flex; gap: 5px; border-bottom: 1px solid #ddd; align-items: center; }
        .header-tools button { flex: 1; padding: 8px 2px; border: 1px solid #ddd; border-radius: 6px; background: white; font-size: 11px; font-weight: bold; }
        .header-tools button.active { background: var(--blue); color: white; }
        .btn-import { background: #6c5ce7 !important; color: white !important; }
        #mainContent { padding: 10px; padding-bottom: 160px; }
        .card { background: white; border-radius: 10px; padding: 12px; margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid #ccc; }
        .card.buy { border-left-color: var(--green); }
        .card.sell { border-left-color: var(--red); }
        .row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 10px; border-top: 1px solid #ddd; }
        .btn-save { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 8px; font-weight: bold; }
        select, input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
    </style>
</head>
<body>

<div class="header-tools">
    <button id="btnCard" class="active" onclick="setView('card')">Dạng Card</button>
    <button id="btnTable" onclick="setView('table')">Dạng Bảng</button>
    <button class="btn-import" onclick="importFromJava()">📥 Import</button>
    <div id="livePrice" style="font-size: 10px; font-weight: bold; color: var(--green); margin-left: 5px;">...</div>
</div>

<div id="mainContent">
    <select id="coinName" style="width:100%; margin-bottom:10px;" onchange="render()"></select>
    <div id="displayArea"></div>
</div>

<div class="footer">
    <div style="display:flex; gap:5px; margin-bottom:8px;">
        <input type="number" id="price" placeholder="Giá" style="flex:2">
        <input type="number" id="qty" placeholder="SL" style="flex:1">
        <select id="type"><option>Mua</option><option>Bán</option></select>
    </div>
    <button class="btn-save" onclick="save()">LƯU LỆNH VÀO DB</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let allOrders = [];

    function init() {
        // 1. Lấy danh sách coin từ URL
        const params = new URLSearchParams(window.location.search);
        const list = params.get('list');
        if (list) localStorage.setItem('coin_list', list);
        updateSelect();

        // 2. Lấy dữ liệu từ LocalStorage (Không dùng Cloud nữa vì bị giới hạn 4096)
        const localData = localStorage.getItem('my_orders_data');
        if (localData) {
            decodeAndProcess(localData);
        } else {
            document.getElementById('displayArea').innerHTML = "Bấm Import để nạp dữ liệu!";
        }
    }

    function importFromJava() {
        let input = window.prompt("Dán mã từ file TXT vào đây (Dung lượng lớn thoải mái):");
        if (!input) return;

        try {
            // Lưu thẳng vào LocalStorage của máy
            localStorage.setItem('my_orders_data', input.trim());
            alert("✅ Đã nạp thành công dữ liệu khủng!");
            window.location.reload();
        } catch (e) {
            alert("Lỗi bộ nhớ máy: " + e.message);
        }
    }

    function decodeAndProcess(base64) {
        try {
            let str = "";
            try { str = decodeURIComponent(escape(atob(base64))); } catch(e) { str = atob(base64); }
            
            allOrders = str.split(';').filter(x => x.includes('|')).map(row => {
                const p = row.split('|');
                return { id: p[0], n: p[1], p: p[2], q: p[3], t: p[4] === 'B' ? 'Bán' : 'Mua' };
            });

            // Tự cập nhật list coin nếu trong data có coin mới
            let coins = JSON.parse(JSON.stringify(localStorage.getItem('coin_list') || "")).split(',');
            allOrders.forEach(o => { if(!coins.includes(o.n)) coins.push(o.n); });
            localStorage.setItem('coin_list', coins.filter(x=>x).join(','));
            
            updateSelect();
            render();
        } catch(e) { console.error(e); }
    }

    function updateSelect() {
        const s = document.getElementById('coinName');
        const list = localStorage.getItem('coin_list') || "";
        s.innerHTML = list.split(',').map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function render() {
        const coin = document.getElementById('coinName').value;
        const filtered = allOrders.filter(o => o.n === coin).sort((a,b) => b.id - a.id);
        let html = "";
        filtered.forEach(o => {
            html += `<div class="card ${o.t === 'Mua' ? 'buy' : 'sell'}">
                <div class="row"><b>ID: ${o.id}</b> <span style="color:${o.t==='Mua'?'green':'red'}">${o.t}</span></div>
                <div class="row"><span>Giá: ${o.p}</span> <span>SL: ${o.q}</span></div>
            </div>`;
        });
        document.getElementById('displayArea').innerHTML = html || "Không có lệnh.";
    }

    function save() {
        const coin = document.getElementById('coinName').value;
        const p = document.getElementById('price').value;
        const q = document.getElementById('qty').value;
        const t = document.getElementById('type').value;
        tg.sendData(`${t === 'Mua' ? 'BUY' : 'SELL'}|${coin}|${p}|${q}`);
        tg.close();
    }

    window.onload = init;
</script>
</body>
</html>
