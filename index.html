<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Manager Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #0088cc; --red: #eb4d4b; --green: #34c759; --bg: #efeff4; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; overflow: hidden; }
        .header-tools { background: white; padding: 6px; border-bottom: 1px solid #ddd; display: flex; gap: 4px; justify-content: center; align-items: center; }
        .header-tools button { padding: 4px 8px; font-size: 10px; border-radius: 4px; border: 1px solid #ccc; background: #f9f9f9; font-weight: bold; }
        .header-tools button.active { background: var(--blue); color: white; border-color: var(--blue); }
        .main-scroll { height: calc(100vh - 275px); overflow-y: auto; box-sizing: border-box; -webkit-overflow-scrolling: touch; background: white; }
        
        /* Table View */
        .table-container { width: 100%; display: none; }
        .table-view { width: 100%; border-collapse: collapse; font-size: 11px; }
        .table-view th { background: #f8f9fa; position: sticky; top: 0; padding: 8px 4px; border-bottom: 2px solid #dee2e6; text-align: left; z-index: 10; }
        .table-view td { padding: 8px 4px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .table-view tr.is-sold { background: #f9f9f9; color: #ccc; }

        /* Card View */
        .card-container { padding: 8px; display: block; }
        .card { background: white; border-radius: 8px; padding: 6px 10px; margin-bottom: 6px; border: 1px solid #ddd; }
        .card.is-sold { opacity: 0.4; background: #f2f2f2; }
        .card-row-1 { display: flex; justify-content: space-between; align-items: center; }
        .card-name { font-size: 14px; font-weight: bold; }
        .card-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 2px; margin-top: 4px; }
        .grid-item { font-size: 11px; }
        .grid-item span { font-size: 9px; color: #888; }

        /* Footer Form */
        .footer-form { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #ccc; padding: 8px; z-index: 100; }
        .type-selector { display: flex; gap: 4px; margin-bottom: 6px; }
        .type-selector button { flex: 1; padding: 6px; border-radius: 4px; border: 1px solid #ddd; font-weight: bold; font-size: 11px; }
        .btn-buy.active { background: var(--green); color: white; border: none; }
        .btn-sell.active { background: var(--red); color: white; border: none; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-bottom: 6px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 6px; font-weight: bold; }
        .status-bar { margin-top: 6px; font-size: 12px; font-weight: bold; color: var(--red); display: flex; justify-content: space-between; }

        .table-view th:nth-child(1) { width: 25%; }
        .table-view th:nth-child(2) { width: 30%; }
        .table-view th:nth-child(3) { width: 30%; }
        .table-view th:nth-child(4) { width: 15%; }

        
        
    </style>
</head>
<body>

    <div class="header-tools">
        <button id="btnCard" class="active" onclick="setView('card')">Dạng Card</button>
        <button id="btnTable" onclick="setView('table')">Dạng Bảng</button>
        <div style="flex-grow: 1;"></div>
        <div id="livePrice" style="font-size: 10px; color: var(--green); font-weight: bold;">Đang tải...</div>
    </div>

    <div class="main-scroll">
        <div id="cardContainer" class="card-container"></div>
        <div id="tableContainer" class="table-container">
            <table class="table-view">
                <thead>
                    <tr><th>ID/Coin</th><th>Giá/SL</th><th>Lãi %/$</th><th>Tính</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="footer-form">
        <div class="type-selector">
            <button class="btn-buy active" id="buyType" onclick="setType('Mua')">MUA</button>
            <button class="btn-sell" id="sellType" onclick="setType('Bán')">BÁN</button>
        </div>
        <div style="display:flex; gap:4px; margin-bottom:6px;">
            <select id="coinName" onchange="onCoinChange()"></select>
            <button style="width:40px; border-radius:4px; border:1px solid #ccc;" onclick="addCoin()">+</button>
        </div>
        <div class="input-row">
            <input type="number" id="price" placeholder="Giá" oninput="calcUsdt()">
            <input type="number" id="qty" placeholder="SL" oninput="calcUsdt()">
            <input type="number" id="usdt" placeholder="USDT" oninput="calcQty()">
        </div>
        <button class="btn-save" onclick="saveData()">SAVE LỆNH VÀO DB</button>
        <div class="status-bar"><span id="totalU">Tổng chọn: 0.00 u</span><span id="totalQ">SL: 0.00</span></div>
    </div>

    <script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let allOrders = []; 
    let displayData = []; 
    let currentView = 'card';
    let currentLivePrice = 0;

    // --- 1. KHỞI CHẠY HỆ THỐNG ---
    function initData() {
        const params = new URLSearchParams(window.location.search);
        const listParam = params.get('list');
        const dataParam = params.get('data');

        // Xử lý danh sách Coin (Dùng localStorage vì nhẹ và sync)
        if (listParam) {
            localStorage.setItem('cache_coin_list', listParam);
            renderCoinSelect(listParam);
        } else {
            const savedList = localStorage.getItem('cache_coin_list');
            if (savedList) renderCoinSelect(savedList);
        }

        // Xử lý dữ liệu Lệnh (Dùng CloudStorage bất đồng bộ)
        tg.CloudStorage.getItem('my_crypto_cache', (err, storedData) => {
            if (err) console.error("Lỗi truy cập kho Telegram:", err);

            // ƯU TIÊN 1: Có dữ liệu mới từ URL và nó khác dữ liệu trong kho
            if (dataParam && dataParam !== storedData) {
                console.log("Phát hiện dữ liệu mới, đang cập nhật kho...");
                tg.CloudStorage.setItem('my_crypto_cache', dataParam);
                parseAndDisplay(dataParam);
            } 
            // ƯU TIÊN 2: Không có dữ liệu mới hoặc dữ liệu trùng, lấy từ kho ra dùng
            else if (storedData) {
                console.log("Dùng dữ liệu từ kho.");
                parseAndDisplay(storedData);
            }
            // ƯU TIÊN 3: Kho trống và có data ở URL (Lần đầu chạy App)
            else if (dataParam) {
                console.log("Nạp dữ liệu lần đầu.");
                tg.CloudStorage.setItem('my_crypto_cache', dataParam);
                parseAndDisplay(dataParam);
            }
        });
    }

    // --- 2. XỬ LÝ HIỂN THỊ ---
    function renderCoinSelect(encodedList) {
        try {
            const decodedList = atob(encodedList.replace(/-/g, '+').replace(/_/g, '/'));
            const coins = decodedList.split(',');
            const select = document.getElementById('coinName');
            select.innerHTML = coins.map(c => `<option value="${c}">${c}</option>`).join('');
        } catch (e) { console.error("Lỗi nạp coin list:", e); }
    }

    function parseAndDisplay(encodedData) {
        try {
            const decodedData = atob(encodedData.replace(/-/g, '+').replace(/_/g, '/'));
            const rows = decodedData.split(';');
            allOrders = rows.map(row => {
                const p = row.split('|');
                return { 
                    id: p[0], n: p[1], p: parseFloat(p[2]), q: parseFloat(p[3]), 
                    t: p[4], isSold: p[5] === "0", isCalc: p[5] === "1", lPct: 0 
                };
            });
            
            // Sau khi nạp xong allOrders mới bắt đầu lọc theo Coin mặc định
            if (allOrders.length > 0) {
                onCoinChange(); 
            }
        } catch (e) { console.error("Lỗi parse data:", e); }
    }

    function onCoinChange() {
        const select = document.getElementById('coinName');
        if (!select.value) return; // Tránh lỗi khi danh sách rỗng
        
        const coin = select.value;
        displayData = allOrders.filter(x => x.n === coin);
        updateLivePrice(coin); 
    }

    // --- CÁC HÀM CÒN LẠI (GIỮ NGUYÊN NHƯ CŨ) ---
    function updateLivePrice(symbol) {
        const statusBox = document.getElementById('livePrice');
        statusBox.innerText = "Đang lấy giá...";
        if (symbol === "NIGHT") {
            currentLivePrice = 0.03731;
            processAfterPriceUpdate(symbol, currentLivePrice);
        } else {
            fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}USDT`)
                .then(res => res.json())
                .then(data => {
                    if(data.price) {
                        currentLivePrice = parseFloat(data.price);
                        processAfterPriceUpdate(symbol, currentLivePrice);
                    }
                }).catch(() => {
                    statusBox.innerText = "Lỗi kết nối API";
                    render();
                });
        }
    }

    function processAfterPriceUpdate(symbol, price) {
        const statusBox = document.getElementById('livePrice');
        const displayPrice = price < 1 ? price.toFixed(6) : price.toFixed(4);
        statusBox.innerText = `${symbol}: ${displayPrice}$`;
        document.getElementById('price').value = price;
        displayData.forEach(o => {
            if (o.p > 0) {
                o.lPct = o.t === 'Mua' ? ((price - o.p) / o.p * 100).toFixed(2) : ((o.p - price) / o.p * 100).toFixed(2);
            }
        });
        render();
        calcUsdt();
    }

    function render() {
        if (currentView === 'card') renderCards(); else renderTable();
        updateSum();
    }

    function getProfitUsd(o) {
        if (!currentLivePrice || o.isSold) return "0.00";
        const diff = o.t === 'Mua' ? (currentLivePrice - o.p) : (o.p - currentLivePrice);
        return (diff * o.q).toFixed(2);
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = displayData.map((o, i) => {
            const profitUsd = getProfitUsd(o);
            const color = parseFloat(o.lPct) >= 0 ? '#34c759' : '#eb4d4b';
            const rowStyle = o.isSold ? 'style="opacity: 0.5; background: #f9f9f9;"' : '';
            return `<tr ${rowStyle}>
                <td style="font-size:10px"><b>${o.n}</b> ${o.isSold ? '<span style="color:red">[SOLD]</span>' : ''}<br>ID:${o.id}</td>
                <td style="font-size:10px">${o.p}<br><span style="color:#888">SL:${o.q}</span></td>
                <td style="color:${color}; font-size:10px"><b>${o.lPct}%</b><br><span>${profitUsd} u</span></td>
                <td><div style="display:flex; flex-direction:column; gap:4px; align-items:center;">
                    <input type="checkbox" ${o.isCalc?'checked':''} onchange="displayData[${i}].isCalc=!displayData[${i}].isCalc;updateSum()">
                    ${!o.isSold ? `<button onclick="closeOrder(${o.id})" style="border:none; background:none; font-size:12px; padding:0;">✅</button>` : '🏁'}
                </div></td></tr>`;
        }).join('');
    }

    function renderCards() {
        const container = document.getElementById('cardContainer');
        container.innerHTML = displayData.map((o, i) => {
            const profitUsd = getProfitUsd(o);
            const color = parseFloat(o.lPct) >= 0 ? '#34c759' : '#eb4d4b';
            return `<div class="card ${o.isSold ? 'is-sold' : ''}">
                <div class="card-row-1">
                    <div class="card-name">${o.n} <small style="color:${o.t==='Mua'?'green':'red'}">${o.t}</small> <small style="color:#888; font-weight:normal;">#${o.id}</small></div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        ${!o.isSold ? `<button onclick="closeOrder(${o.id})" style="padding:2px 6px; font-size:10px; background:#34c759; color:white; border:none; border-radius:4px;">Chốt</button>` : ''}
                        <input type="checkbox" ${o.isCalc?'checked':''} onchange="displayData[${i}].isCalc=!displayData[${i}].isCalc;updateSum()">
                    </div>
                </div>
                <div class="card-grid">
                    <div class="grid-item"><span>GIÁ:</span><br>${o.p}</div>
                    <div class="grid-item"><span>SL:</span><br>${o.q}</div>
                    <div class="grid-item" style="text-align:right"><span>LÃI:</span><br><b style="color:${color}">${o.lPct}% (${profitUsd}u)</b></div>
                </div></div>`;
        }).join('');
    }

    function closeOrder(orderId) {
        if(confirm("Ông giáo muốn chốt lệnh ID " + orderId + " này chứ?")) {
            const payload = { action: "CLOSE_ORDER", id: orderId, time: new Date().toLocaleString('vi-VN') };
            tg.sendData(JSON.stringify(payload));
            tg.close();
        }
    }

    function setView(v) {
        currentView = v;
        document.getElementById('btnCard').classList.toggle('active', v === 'card');
        document.getElementById('btnTable').classList.toggle('active', v === 'table');
        document.getElementById('cardContainer').style.display = (v === 'card' ? 'block' : 'none');
        document.getElementById('tableContainer').style.display = (v === 'table' ? 'block' : 'none');
        render();
    }

    function setType(t) {
        document.getElementById('buyType').classList.toggle('active', t === 'Mua');
        document.getElementById('sellType').classList.toggle('active', t === 'Bán');
    }

    function calcUsdt() {
        let p = document.getElementById('price').value;
        let q = document.getElementById('qty').value;
        if(p && q) document.getElementById('usdt').value = (p * q).toFixed(2);
    }

    function calcQty() {
        let p = document.getElementById('price').value;
        let u = document.getElementById('usdt').value;
        if(p && u) document.getElementById('qty').value = (u / p).toFixed(4);
    }

    function updateSum() {
        let u = 0, q = 0;
        displayData.filter(x => x.isCalc && !x.isSold).forEach(x => { 
            u += parseFloat(x.p * x.q); 
            q += parseFloat(x.q); 
        });
        document.getElementById('totalU').innerText = `Tổng chọn: ${u.toFixed(2)} u`;
        document.getElementById('totalQ').innerText = `SL: ${q.toFixed(4)}`;
    }

    function saveData() {
        const payload = {
            coin: document.getElementById('coinName').value,
            type: document.querySelector('.type-selector .active').innerText,
            price: document.getElementById('price').value,
            qty: document.getElementById('qty').value,
            time: new Date().toLocaleString('vi-VN')
        };
        tg.sendData(JSON.stringify(payload));
        tg.close();
    }

    function addCoin() {
        let c = prompt("Tên Coin mới (VD: SOL):");
        if(c) {
            let s = document.getElementById('coinName');
            let o = document.createElement('option');
            o.value = c.toUpperCase(); o.text = c.toUpperCase();
            s.add(o); s.value = o.value; onCoinChange();
        }
    }

    // --- KÍCH HOẠT ---
    initData();
</script>
</body>
</html>
