<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Manager Pro Full</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #0088cc; --red: #eb4d4b; --green: #34c759; --bg: #efeff4; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; overflow: hidden; }

        /* Toolbar trên cùng */
        .header-tools { background: white; padding: 8px; border-bottom: 1px solid #ddd; display: flex; gap: 5px; justify-content: center; }
        .header-tools button { padding: 5px 8px; font-size: 11px; border-radius: 4px; border: 1px solid #ccc; background: #f9f9f9; }

        /* Vùng cuộn danh sách card */
        .main-scroll { height: calc(100vh - 280px); overflow-y: auto; padding: 10px; box-sizing: border-box; }

        .card { background: white; border-radius: 10px; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; }
        .card.is-sold { opacity: 0.5; background: #f2f2f2; }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 5px; }
        
        .action-group { display: flex; gap: 12px; }
        .check-item { text-align: center; }
        .check-item label { display: block; font-size: 9px; font-weight: bold; margin-bottom: 2px; }
        .cb-calc { accent-color: var(--blue); width: 18px; height: 18px; }
        .cb-sold { accent-color: var(--red); width: 18px; height: 18px; }

        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 12px; }
        .grid-item span { font-size: 10px; color: #888; text-transform: uppercase; }

        /* Form dính đáy - Bổ sung các nút và input thiếu */
        .footer-form { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #ccc; padding: 10px; z-index: 100; }
        
        .type-selector { display: flex; gap: 5px; margin-bottom: 8px; }
        .type-selector button { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ddd; font-weight: bold; font-size: 12px; }
        .btn-buy.active { background: var(--green); color: white; border: none; }
        .btn-sell.active { background: var(--red); color: white; border: none; }

        .input-group { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; }
        .btn-add-coin { padding: 8px 12px; background: #eee; border: 1px solid #ccc; border-radius: 5px; font-weight: bold; }

        .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 8px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; box-sizing: border-box; }

        .btn-save { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; }
        
        .status-bar { margin-top: 8px; font-size: 13px; font-weight: bold; color: var(--red); display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="header-tools">
        <button onclick="alert('Import Binance CSV')">Import Binance CSV</button>
        <button onclick="alert('Lấy giá sàn')">Lấy giá từ sàn</button>
        <div style="font-size: 11px; color: var(--green); font-weight: bold; align-self: center;">+0.01$</div>
    </div>

    <div class="main-scroll" id="cardContainer">
        </div>

    <div class="footer-form">
        <div class="type-selector">
            <button class="btn-buy active" id="buyType" onclick="setType('Mua')">MUA</button>
            <button class="btn-sell" id="sellType" onclick="setType('Bán')">BÁN</button>
        </div>

        <div class="input-group">
            <select id="coinName" style="flex: 2;">
                <option value="NIGHT">NIGHT</option>
                <option value="ADA">ADA</option>
            </select>
            <button class="btn-add-coin" onclick="addCoinName()">+</button>
        </div>

        <div class="input-row">
            <input type="number" id="price" placeholder="Giá" oninput="calcUsdt()">
            <input type="number" id="qty" placeholder="SL" oninput="calcUsdt()">
            <input type="number" id="usdt" placeholder="USDT" oninput="calcQty()">
        </div>

        <button class="btn-save" onclick="saveData()">SAVE DỮ LIỆU</button>
        
        <div class="status-bar">
            <span id="totalU">Chọn: 0.00 u</span>
            <span id="totalQ">SL: 0.0000</span>
        </div>
    </div>

    <script>
        let data = [
        {n: "NIGHT", p: 0.03731, q: 401, t: "Mua", l: -2.17, isCalc: true, isSold: false},
        {n: "ADA", p: 0.52, q: 1000, t: "Mua", l: 5.77, isCalc: true, isSold: false},
        {n: "BTC", p: 65000.5, q: 0.01, t: "Mua", l: 1.2, isCalc: false, isSold: false},
        {n: "ETH", p: 3500.2, q: 0.5, t: "Mua", l: -0.5, isCalc: false, isSold: false},
        {n: "SOL", p: 145.8, q: 10, t: "Bán", l: 10.5, isCalc: false, isSold: true},
        {n: "BNB", p: 580.0, q: 2, t: "Mua", l: 3.1, isCalc: false, isSold: false},
        {n: "DOT", p: 7.2, q: 100, t: "Mua", l: -4.2, isCalc: false, isSold: false},
        {n: "LINK", p: 15.3, q: 50, t: "Mua", l: 2.8, isCalc: false, isSold: false},
        {n: "AVAX", p: 35.1, q: 20, t: "Mua", l: -1.5, isCalc: false, isSold: false},
        {n: "NEAR", p: 6.8, q: 200, t: "Bán", l: 15.0, isCalc: false, isSold: true},
        {n: "MATIC", p: 0.72, q: 500, t: "Mua", l: -8.3, isCalc: false, isSold: false},
        {n: "XRP", p: 0.51, q: 1000, t: "Mua", l: 0.0, isCalc: false, isSold: false}
    ];

        function setType(t) {
            document.getElementById('buyType').classList.toggle('active', t === 'Mua');
            document.getElementById('sellType').classList.toggle('active', t === 'Bán');
        }

        // Tự động tính USDT khi nhập Giá và SL
        function calcUsdt() {
            let p = document.getElementById('price').value;
            let q = document.getElementById('qty').value;
            if(p && q) document.getElementById('usdt').value = (p * q).toFixed(2);
        }

        // Tự động tính SL khi nhập Giá và USDT
        function calcQty() {
            let p = document.getElementById('price').value;
            let u = document.getElementById('usdt').value;
            if(p && u) document.getElementById('qty').value = (u / p).toFixed(4);
        }

        function addCoinName() {
            let newCoin = prompt("Nhập tên Coin mới:");
            if(newCoin) {
                let sel = document.getElementById('coinName');
                let opt = document.createElement('option');
                opt.value = newCoin.toUpperCase();
                opt.innerHTML = newCoin.toUpperCase();
                sel.appendChild(opt);
                sel.value = opt.value;
            }
        }

        function render() {
            document.getElementById('cardContainer').innerHTML = data.map((o, i) => `
                <div class="card ${o.isSold ? 'is-sold' : ''}">
                    <div class="card-header">
                        <b>${o.n} <small style="color:${o.t==='Mua'?'green':'red'}">[${o.t}]</small></b>
                        <div class="action-group">
                            <div class="check-item"><label style="color:var(--blue)">TÍNH</label>
                                <input type="checkbox" class="cb-calc" ${o.isCalc?'checked':''} onchange="data[${i}].isCalc=!data[${i}].isCalc;updateSum()"></div>
                            <div class="check-item"><label style="color:var(--red)">CHỐT</label>
                                <input type="checkbox" class="cb-sold" ${o.isSold?'checked':''} onchange="data[${i}].isSold=!data[${i}].isSold;render()"></div>
                        </div>
                    </div>
                    <div class="card-grid">
                        <div class="grid-item"><span>Giá mua</span>${o.p}</div>
                        <div class="grid-item"><span>Số lượng</span>${o.q}</div>
                        <div class="grid-item"><span>Lãi/Lỗ</span><b style="color:${o.l>=0?'green':'red'}">${o.l}%</b></div>
                    </div>
                </div>`).join('');
            updateSum();
        }

        function updateSum() {
            let u = 0, q = 0;
            data.filter(x => x.isCalc).forEach(x => { u += x.p * x.q; q += x.q; });
            document.getElementById('totalU').innerText = `Chọn: ${u.toFixed(2)} u`;
            document.getElementById('totalQ').innerText = `SL: ${q.toFixed(4)}`;
        }

        function saveData() { alert("Đã lưu dữ liệu thành công!"); }

        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        render();
    </script>
</body>
</html>
