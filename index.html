<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Manager Compact</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #0088cc; --red: #eb4d4b; --green: #34c759; --bg: #efeff4; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; overflow: hidden; }

        /* Toolbar trên cùng */
        .header-tools { background: white; padding: 6px; border-bottom: 1px solid #ddd; display: flex; gap: 4px; justify-content: center; align-items: center; }
        .header-tools button { padding: 4px 6px; font-size: 10px; border-radius: 4px; border: 1px solid #ccc; background: #f9f9f9; }
        .input-target { width: 70px; padding: 3px; border: 1px solid #ddd; border-radius: 4px; font-size: 10px; text-align: center; }

        /* Vùng cuộn danh sách card - Tối ưu diện tích */
        .main-scroll { height: calc(100vh - 275px); overflow-y: auto; padding: 8px; box-sizing: border-box; -webkit-overflow-scrolling: touch; }

        /* Thẻ Card nhỏ gọn (Compact) */
        .card { background: white; border-radius: 8px; padding: 6px 10px; margin-bottom: 6px; border: 1px solid #ddd; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .card.is-sold { opacity: 0.4; background: #f2f2f2; }
        
        .card-row-1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .card-name { font-size: 14px; font-weight: bold; }
        .card-type { font-size: 10px; margin-left: 4px; }

        .action-group { display: flex; gap: 10px; }
        .check-item { display: flex; align-items: center; gap: 3px; }
        .check-item label { font-size: 9px; font-weight: bold; }
        .cb-calc { accent-color: var(--blue); width: 16px; height: 16px; margin: 0; }
        .cb-sold { accent-color: var(--red); width: 16px; height: 16px; margin: 0; }

        .card-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 2px; align-items: center; }
        .grid-item { font-size: 11px; white-space: nowrap; }
        .grid-item span { font-size: 9px; color: #888; margin-right: 3px; }

        /* Form dính đáy */
        .footer-form { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #ccc; padding: 8px; z-index: 100; }
        .type-selector { display: flex; gap: 4px; margin-bottom: 6px; }
        .type-selector button { flex: 1; padding: 6px; border-radius: 4px; border: 1px solid #ddd; font-weight: bold; font-size: 11px; }
        .btn-buy.active { background: var(--green); color: white; border: none; }
        .btn-sell.active { background: var(--red); color: white; border: none; }

        .input-group { display: flex; align-items: center; gap: 4px; margin-bottom: 6px; }
        .btn-add-coin { padding: 6px 10px; background: #eee; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; }

        .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-bottom: 6px; }
        input, select { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; box-sizing: border-box; }

        .btn-save { width: 100%; padding: 10px; background: var(--blue); color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 13px; }
        .status-bar { margin-top: 6px; font-size: 12px; font-weight: bold; color: var(--red); display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="header-tools">
        <button>Binance CSV</button>
        <button>Lấy giá sàn</button>
        <input type="number" class="input-target" id="targetPrice" placeholder="Giá đích...">
        <div style="font-size: 10px; color: var(--green); font-weight: bold;">+0.01$</div>
    </div>

    <div class="main-scroll" id="cardContainer"></div>

    <div class="footer-form">
        <div class="type-selector">
            <button class="btn-buy active" id="buyType" onclick="setType('Mua')">MUA</button>
            <button class="btn-sell" id="sellType" onclick="setType('Bán')">BÁN</button>
        </div>
        <div class="input-group">
            <select id="coinName" style="flex: 2;"><option value="NIGHT">NIGHT</option><option value="ADA">ADA</option></select>
            <button class="btn-add-coin" onclick="addCoinName()">+</button>
        </div>
        <div class="input-row">
            <input type="number" id="price" placeholder="Giá" oninput="calcUsdt()">
            <input type="number" id="qty" placeholder="SL" oninput="calcUsdt()">
            <input type="number" id="usdt" placeholder="USDT" oninput="calcQty()">
        </div>
        <button class="btn-save" onclick="saveData()">SAVE DỮ LIỆU</button>
        <div class="status-bar"><span id="totalU">Chọn: 0.00 u</span><span id="totalQ">SL: 0.0000</span></div>
    </div>

    <script>
        // 1. Khởi tạo dữ liệu: Để trống để nhận từ URL hoặc DB sau này
        let data = [];

        // 2. Hàm giải mã danh sách Coin từ Bot gửi sang qua URL
        function loadCoinListFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const encodedList = params.get('list');
            const select = document.getElementById('coinName');

            if (encodedList && select) {
                try {
                    // Giải mã Base64 (tương ứng với Base64.getUrlEncoder bên Java)
                    const decodedText = atob(encodedList.replace(/-/g, '+').replace(/_/g, '/'));
                    const coins = decodedText.split(',');

                    select.innerHTML = ''; // Xóa sạch "NIGHT", "ADA" mặc định
                    coins.forEach(coin => {
                        let opt = document.createElement('option');
                        opt.value = coin.toUpperCase();
                        opt.innerHTML = coin.toUpperCase();
                        select.appendChild(opt);
                    });
                    console.log("✅ Đã nạp danh sách coin từ Bot");
                } catch (e) {
                    console.error("❌ Lỗi giải mã danh sách coin:", e);
                }
            }
        }

        // 3. Logic xử lý Form (Giữ nguyên của ông giáo và thêm lấy giá Binance)
        function setType(t) {
            document.getElementById('buyType').classList.toggle('active', t === 'Mua');
            document.getElementById('sellType').classList.toggle('active', t === 'Bán');
        }

        function calcUsdt() {
            let p = document.getElementById('price').value, q = document.getElementById('qty').value;
            if(p && q) document.getElementById('usdt').value = (p * q).toFixed(2);
        }

        function calcQty() {
            let p = document.getElementById('price').value, u = document.getElementById('usdt').value;
            if(p && u) document.getElementById('qty').value = (u / p).toFixed(4);
        }

        // Khi chọn coin trong danh sách, tự điền giá từ Binance (trừ NIGHT)
        document.getElementById('coinName').addEventListener('change', function() {
            const symbol = this.value;
            if (symbol === "NIGHT") {
                document.getElementById('price').value = 0.03731; // Giá cứng của ông giáo
                calcUsdt();
            } else {
                fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}USDT`)
                    .then(res => res.json())
                    .then(resData => {
                        if(resData.price) {
                            document.getElementById('price').value = parseFloat(resData.price).toFixed(4);
                            calcUsdt();
                        }
                    }).catch(err => console.log("Không lấy được giá sàn"));
            }
        });

        function addCoinName() {
            let newCoin = prompt("Nhập tên Coin mới:");
            if(newCoin) {
                let sel = document.getElementById('coinName'), opt = document.createElement('option');
                opt.value = newCoin.toUpperCase(); opt.innerHTML = newCoin.toUpperCase();
                sel.appendChild(opt); sel.value = opt.value;
            }
        }

        // 4. Render và Tính toán
        function render() {
            const container = document.getElementById('cardContainer');
            if (data.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:#888; margin-top:20px;">Chưa có dữ liệu lệnh</div>`;
                return;
            }
            container.innerHTML = data.map((o, i) => `
                <div class="card ${o.isSold ? 'is-sold' : ''}">
                    <div class="card-row-1">
                        <div class="card-name">${o.n}<span class="card-type" style="color:${o.t==='Mua'?'green':'red'}">[${o.t}]</span></div>
                        <div class="action-group">
                            <div class="check-item"><label style="color:var(--blue)">TÍNH</label>
                                <input type="checkbox" class="cb-calc" ${o.isCalc?'checked':''} onchange="data[${i}].isCalc=!data[${i}].isCalc;updateSum()"></div>
                            <div class="check-item"><label style="color:var(--red)">CHỐT</label>
                                <input type="checkbox" class="cb-sold" ${o.isSold?'checked':''} onchange="data[${i}].isSold=!data[${i}].isSold;render()"></div>
                        </div>
                    </div>
                    <div class="card-grid">
                        <div class="grid-item"><span>GIÁ:</span>${o.p}</div>
                        <div class="grid-item"><span>SL:</span>${o.q}</div>
                        <div class="grid-item"><b style="color:${o.l>=0?'green':'red'}">${o.l}%</b></div>
                    </div>
                </div>`).join('');
            updateSum();
        }

        function updateSum() {
            let u = 0, q = 0;
            data.filter(x => x.isCalc).forEach(x => { u += x.p * x.q; q += x.q; });
            document.getElementById('totalU').innerText = `Chọn: ${u.toFixed(2)} u`;
            document.getElementById('totalQ').innerText = `SL: ${q.toFixed(4)}`;
        }

        // 5. Gửi dữ liệu ngược về Bot Java
        function saveData() {
            const payload = {
                coin: document.getElementById('coinName').value,
                type: document.querySelector('.type-selector .active').innerText,
                price: document.getElementById('price').value,
                qty: document.getElementById('qty').value
            };
            
            // Gửi tin nhắn về Bot và đóng App
            tg.sendData(JSON.stringify(payload));
            tg.close();
        }

        // Khởi động
        const tg = window.Telegram.WebApp;
        tg.ready(); 
        tg.expand();
        
        loadCoinListFromUrl(); // Lấy danh sách coin từ Bot
        render();
    </script>
</body>
</html>
